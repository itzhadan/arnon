<!DOCTYPE html>
<html lang="he">
<meta charset="UTF-8">

<body>

<h2>🎤 תמלול קול</h2>

<input type="file" id="audioFile">
<button onclick="send()">שלח</button>

<p id="result"></p>

<script>
async function send() {
    let file = document.getElementById("audioFile").files[0];

    let formData = new FormData();
    formData.append("file", file);

    document.getElementById("result").innerText = "⏳ מעבד...";

    let res = await fetch("/transcribe", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    document.getElementById("result").innerText = data.text;
}
</script>

</body>
</html>
